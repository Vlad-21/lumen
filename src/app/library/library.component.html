<div class="library">
  <header class="library__header">
    <h1 class="library__title">My Library</h1>
    <div class="library__actions">
      <button class="library__add-btn">+ Add Book</button>
    </div>
  </header>

  <div class="library__grid">
    @for (book of books(); track book.id) {
      <div class="book-card">
        <div class="book-card__cover">
          <img [src]="book.cover" [alt]="book.title" />
        </div>
        <div class="book-card__info">
          <p class="book-card__title">{{ book.title }}</p>
          <p class="book-card__author">{{ book.author }}</p>
          <div class="book-card__progress">
            <div class="book-card__progress-bar" [style.width.%]="book.progress"></div>
          </div>
        </div>
      </div>
    } @empty {
      <div class="library__empty">
        <p class="library__empty-text">Your library is empty</p>
        <p class="library__empty-hint">Add your first epub book to get started</p>
      </div>
    }
  </div>
</div>
